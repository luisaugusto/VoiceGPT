name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SCHEME: VoiceGPT
  DEVICE_NAME: iPhone 17

jobs:
  test:
    name: Unit & UI Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve packages
        run: |
          xcodebuild -project VoiceGPT.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -resolvePackageDependencies

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for runtime, devices in d['devices'].items():
              if 'iOS' not in runtime: continue
              for dev in devices:
                  if dev.get('name') == '${{ env.DEVICE_NAME }}' and dev.get('isAvailable'):
                      print(dev['udid'])
                      break
          " | head -1)
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" 2>/dev/null || true

      - name: Run tests
        run: |
          xcodebuild test \
            -project VoiceGPT.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -destination "id=${{ env.SIMULATOR_UDID }}" \
            -resultBundlePath TestResults.xcresult \
            -quiet

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
