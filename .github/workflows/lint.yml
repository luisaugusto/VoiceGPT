name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SCHEME: VoiceGPT
  DESTINATION: platform=iOS Simulator,OS=latest,name=iPhone 17

jobs:
  lint:
    name: Warnings as Errors
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve packages
        run: |
          xcodebuild -project VoiceGPT.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -resolvePackageDependencies

      - name: Build and check for warnings
        run: |
          set -o pipefail
          xcodebuild build \
            -project VoiceGPT.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -destination "${{ env.DESTINATION }}" \
            2>&1 | tee /tmp/build.log

          # Fail on any warning in our own Swift source files.
          # Excludes package dependency paths so their -suppress-warnings flags
          # don't conflict and their own warnings don't count against us.
          WARNINGS=$(grep "warning:" /tmp/build.log \
            | grep "\.swift:[0-9]" \
            | grep -v "/SourcePackages/" \
            | grep -v "/.build/" \
            || true)

          if [ -n "$WARNINGS" ]; then
            echo "Warnings found in source files:"
            echo "$WARNINGS"
            exit 1
          fi
          echo "No warnings found in source files."
