name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  SCHEME: VoiceGPT
  DESTINATION: platform=iOS Simulator,OS=latest,name=iPhone 17,arch=arm64

jobs:
  build:
    name: Build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve packages
        run: |
          xcodebuild -project VoiceGPT.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -resolvePackageDependencies

      - name: Build
        run: |
          xcodebuild build \
            -project VoiceGPT.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -destination "${{ env.DESTINATION }}" \
            -quiet
