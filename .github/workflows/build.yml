name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SCHEME: VoiceGPT
  DESTINATION: platform=iOS Simulator,OS=latest,name=iPhone 16 Pro

jobs:
  build:
    name: Build
    # Use a self-hosted runner tagged 'xcode-26' (your Mac).
    # Switch to 'macos-15' once GitHub-hosted runners ship Xcode 26.
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve packages
        run: |
          xcodebuild -project VoiceGPT.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -resolvePackageDependencies

      - name: Build
        run: |
          xcodebuild build \
            -project VoiceGPT.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -destination "${{ env.DESTINATION }}" \
            -quiet
